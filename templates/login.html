<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – University Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">
        <span class="logo-icon">🎓</span>
        <span class="logo-text">University Portal</span>
    </a>
    <div class="navbar-links">
        <a href="/courses">Courses</a>
        <a href="/enrollments">Enrollments</a>
        <a href="/register">Register</a>
        <a href="/login" class="btn-nav active">Login</a>
    </div>
</nav>

<div class="form-page">
    <div class="form-card">
        <div class="form-card-header">
            <div class="form-icon">🔑</div>
            <h2>Welcome Back</h2>
            <p>Sign in to your student account to enroll in courses</p>
        </div>

        {% if error %}
        <div class="alert alert-error">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="yourname@university.edu" required autofocus>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-submit">Sign In →</button>
        </form>

        <div class="form-footer">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</div>

</body>
</html>
